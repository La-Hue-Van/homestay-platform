version: "3.8"

services:

  # ════════════════════════════════
  # MySQL
  # ════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════
  # RabbitMQ
  # ════════════════════════════════
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════
  # Kong API Gateway
  # ════════════════════════════════
  kong:
    image: kong:3.4
    container_name: kong
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./infra/kong.yml:/kong/kong.yml
    depends_on:
      - mysql
      - rabbitmq


# ════════════════════════════════
  # Atomic Services
  # ════════════════════════════════
  users-service:
    build: ./services/users-service
    container_name: users-service
    restart: always
    ports:
      - "5003:5003"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/user_db
      PORT: 5003
    depends_on:
      mysql:
        condition: service_healthy

  listings-service:
    build: ./services/listings-service
    container_name: listings-service
    restart: always
    ports:
      - "5004:5004"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/listings_db
      PORT: 5004
    depends_on:
      mysql:
        condition: service_healthy

  availability-service:
    build: ./services/availability-service
    container_name: availability-service
    restart: always
    ports:
      - "5005:5005"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/availability_db
      PORT: 5005
    depends_on:
      mysql:
        condition: service_healthy

  stay-service:
    build: ./services/stay-service
    container_name: stay-service
    restart: always
    ports:
      - "5006:5006"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/stay_db
      PORT: 5006
    depends_on:
      mysql:
        condition: service_healthy

  inspection-service:
    build: ./services/inspection-service
    container_name: inspection-service
    restart: always
    ports:
      - "5007:5007"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/inspection_db
      PORT: 5007
    depends_on:
      mysql:
        condition: service_healthy

  payment-logs-service:
    build: ./services/payment-logs-service
    container_name: payment-logs-service
    restart: always
    ports:
      - "5008:5008"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/payment_logs_db
      PORT: 5008
    depends_on:
      mysql:
        condition: service_healthy

  listings-search-service:
    build: ./services/listings-search-service
    container_name: listings-search-service
    restart: always
    ports:
      - "5009:5009"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/search_db
      PORT: 5009
    depends_on:
      mysql:
        condition: service_healthy

# ════════════════════════════════
  # Wrapper Services
  # ════════════════════════════════
  payment-gateway-wrapper:
    build: ./services/payment-gateway-wrapper
    container_name: payment-gateway-wrapper
    restart: always
    ports:
      - "5010:5010"
    environment:
      PORT: 5010
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_DEMO_MODE: ${STRIPE_DEMO_MODE}
    depends_on:
      mysql:
        condition: service_healthy

  notification-gateway:
    build: ./services/notification-gateway
    container_name: notification-gateway
    restart: always
    ports:
      - "5011:5011"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/notification_db
      PORT: 5011
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_DEMO_MODE: ${TWILIO_DEMO_MODE}
    depends_on:
      mysql:
        condition: service_healthy

  # ════════════════════════════════
  # Composite Services
  # ════════════════════════════════
  booking-service:
    build: ./services/booking-service
    container_name: booking-service
    restart: always
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/booking_db
      PORT: 5001
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  deposit-resolution:
    build: ./services/deposit-resolution
    container_name: deposit-resolution
    restart: always
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/deposit_db
      PORT: 5002
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ════════════════════════════════
  # Workers
  # ════════════════════════════════
  booking-expirer:
    build: ./workers/booking-expirer
    container_name: booking-expirer
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/booking_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  deposit-expirer:
    build: ./workers/deposit-expirer
    container_name: deposit-expirer
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/stay_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

# ════════════════════════════════
# Volumes
# ════════════════════════════════
volumes:
  mysql_data:

